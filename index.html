<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Contas PRO">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Controle de Contas PRO</title>

<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;background:#0f0f10;color:#fff;font-size:80%}
header{padding:8px;font-size:15px;font-weight:bold}
.container{padding:8px}
.card{background:#1a1a1c;border-radius:12px;padding:8px;margin-bottom:8px}
.section{margin-top:4px;padding:4px;background:#121214;border-radius:8px}
.section-header{display:flex;justify-content:space-between;align-items:center}
.add-btn{cursor:pointer}

.item{
display:flex;
justify-content:space-between;
margin:1px 0;
align-items:center;
padding:3px 5px;
border-radius:6px
}

.item:active{background:#2a2a2c}

.total{margin-top:2px;font-weight:bold}

input,button,textarea{
width:100%;
margin:2px 0;
padding:4px;
border-radius:6px;
border:none;
font-size:12px
}

button{background:#fff;color:#000;font-weight:bold}

.small{font-size:9px;opacity:.7}

.delete-text{
color:#ff4d4d;
font-size:9px;
margin-top:2px;
cursor:pointer
}

.account-header{cursor:pointer}

.arrow{margin-left:4px;font-size:10px;cursor:pointer}

input[type="color"]{
width:24px;
height:24px;
border-radius:50%;
border:none
}

textarea{
min-height:60px;
resize:none;
background:transparent;
color:#fff;
border:none;
outline:none
}
</style>

</head>
<body>

<header contenteditable="true" id="title"></header>
<div class="container">

<div class="card">
<div class="section-header" onclick="toggleAccountForm()">
<strong>Nova Conta</strong>
<span id="toggleIcon">+</span>
</div>
<div id="accountForm" style="display:none">
<div style="display:flex;gap:6px">
<input id="accountName" placeholder="Nova conta" />
<input id="accountColor" type="color" value="#ffffff" />
</div>
<button onclick="addAccount()">Adicionar</button>
</div>
</div>

<div id="accounts"></div>
<div id="grandTotal" class="card"></div>

<div class="card">
<div class="section-header" onclick="toggleNotes()">
<strong>Anotações</strong>
<span id="notesToggle">▼</span>
</div>
<div id="notesArea" style="display:none">
<textarea id="notesInput" placeholder="Escreva suas anotações..."></textarea>
</div>
</div>

</div>

<script>
// 👉 TODO O JS CONTINUA EXATAMENTE IGUAL AO QUE VOCÊ JÁ TEM
// (não alterei absolutamente nada nele)

</script>

</body>
</html>
