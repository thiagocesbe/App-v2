<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle</title>

<style>
body{margin:0;background:#0f0f10;color:#fff;font-family:-apple-system;font-size:80%}
header{padding:10px;font-size:16px;font-weight:bold}
.container{padding:10px}
.card{background:#1a1a1c;border-radius:10px;padding:10px;margin-bottom:10px}
.section{margin-top:6px;padding:6px;background:#121214;border-radius:8px}
.section-header{display:flex;justify-content:space-between}
.item{display:flex;justify-content:space-between;padding:6px;border-radius:6px}
.item.dragging{opacity:.3}
.floating{
position:fixed;
z-index:9999;
pointer-events:none;
background:#1a1a1c;
padding:6px;
border-radius:6px;
transform:scale(1.05);
}
.small{font-size:10px;color:#aaa}
.total{margin-top:5px;font-weight:bold}
textarea{background:transparent;color:#fff;border:none;width:100%;outline:none}
</style>
</head>

<body>

<header contenteditable id="title"></header>

<div class="container">
<div id="accounts"></div>
<div id="grandTotal" class="card"></div>

<div class="card">
<div onclick="toggleNotes()">Anotações ▼</div>
<div id="notesArea" style="display:none">
<textarea id="notesInput"></textarea>
</div>
</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("app")) || [];
let drag = null;
let floating = null;

// TITLE
const titleEl = document.getElementById("title");
titleEl.innerText = localStorage.getItem("title") || "Meu Controle";
titleEl.oninput = () => localStorage.setItem("title", titleEl.innerText);

// NOTES
const notesInput = document.getElementById("notesInput");
notesInput.value = localStorage.getItem("notes") || "";
notesInput.oninput = () => localStorage.setItem("notes", notesInput.value);

function toggleNotes(){
let el=document.getElementById("notesArea");
el.style.display = el.style.display==="none"?"block":"none";
}

// FORMAT
function brl(v){return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}

// RENDER
function render(){
const el = document.getElementById("accounts");
el.innerHTML="";
let total=0;

data.forEach((acc,ai)=>{
let card=document.createElement("div");
card.className="card";

card.innerHTML=`<div style="color:${acc.color}">${acc.name}</div>`;

acc.items.forEach((it,ii)=>{
total+=it.value;

let item=document.createElement("div");
item.className="item";
item.innerHTML=`
<span style="color:${acc.color}">
${it.name}
<div class="small">dia ${it.due||""}</div>
</span>
<span style="color:${acc.color}">${brl(it.value)}</span>
`;

item.ontouchstart = e => startDrag(e,ai,ii,item);
item.ontouchmove = e => moveDrag(e,ai,ii);
item.ontouchend = endDrag;

card.appendChild(item);
});

el.appendChild(card);
});

document.getElementById("grandTotal").innerText="Total: "+brl(total);
}

// DRAG REAL
function startDrag(e,ai,ii,el){
drag={ai,ii,startY:e.touches[0].clientY,el};

floating=el.cloneNode(true);
floating.classList.add("floating");
document.body.appendChild(floating);
}

function moveDrag(e,ai){
if(!drag) return;

const y=e.touches[0].clientY;
floating.style.top=y+"px";
floating.style.left="10px";

const elements=document.elementsFromPoint(e.touches[0].clientX,y);
const target=elements.find(el=>el.classList?.contains("item"));

if(!target) return;

const parent=target.parentNode;
const items=[...parent.querySelectorAll(".item")];
const newIndex=items.indexOf(target);

if(newIndex!==drag.ii){
const arr=data[ai].items;
const moved=arr.splice(drag.ii,1)[0];
arr.splice(newIndex,0,moved);
drag.ii=newIndex;
render();
}
}

function endDrag(){
if(floating) floating.remove();
drag=null;
save();
}

// SAVE
function save(){
localStorage.setItem("app",JSON.stringify(data));
}

// INIT TEST DATA (caso vazio)
if(data.length===0){
data=[
{
name:"Conta Exemplo",
color:"#00ff99",
items:[
{name:"Internet",value:100,due:10},
{name:"Luz",value:80,due:15}
]
}
];
save();
}

render();

</script>

</body>
</html>
